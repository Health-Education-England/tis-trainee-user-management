server:
  port: 8208
  servlet:
    context-path: /trainee-user-management

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${application.environment}

application:
  aws:
    cognito:
      user-pool-id: ${COGNITO_USER_POOL_ID}
      beta-participant-group: ${BETA_PARTICIPANT_GROUP}
    sns:
      user-account:
        update: ${USER_ACCOUNT_UPDATE_EVENT_TOPIC:}
      profile-move:
        request: ${PROFILE_MOVE_EVENT_TOPIC:}
    sqs:
      contact-details:
        updated: ${CONTACT_DETAILS_UPDATED_QUEUE:}
      request: ${REQUEST_QUEUE_URL:}
  environment: ${ENVIRONMENT:local}
  cache:
    key-prefix: UserManagement
    time-to-live: PT24H

spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      cloudwatch:
        namespace: TIS/Trainee/UserManagement
  data:
    mongodb:
      uri: mongodb://${DB_USER:admin}:${DB_PASSWORD:pwd}@${DB_HOST:localhost}:${DB_PORT:27017}/${DB_NAME:user_management}?authSource=${AUTH_SOURCE:admin}&retryWrites=false
      auto-index-creation: true
      uuid-representation: standard
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: ${REDIS_SSL:false}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:password}
      timeout: 60000

profile:
  server:
    name: ${PROFILE_HOST:localhost}
    port: ${PROFILE_PORT:8082}

com:
  amazonaws:
    xray:
      emitters:
        daemon-address: ${AWS_XRAY_DAEMON_ADDRESS:}
